name: Long Usage

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  convert_and_build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Convert project.md to HTML (like build.sh)
        uses: docker://pandoc/core:3.8
        with:
          args: >-
            static/project.md
            -t html
            --strip-comments
            --standalone=false
            -o build/project.html

      - name: Build index.html (like build.sh)
        run: |
          sed "/<!-- PROJECT_MD_HTML -->/{
            r build/project.html
            d
          }" static/prebuild.html > index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

  deploy:
    needs: convert_and_build
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
